<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NewAge Revamp - Starter Idea</title>
  <style>
    body { font-family: Arial, sans-serif; background:#101319; color:#e8eefc; margin:0; }
    .wrap { max-width: 980px; margin: 24px auto; padding: 0 16px; }
    #StartRoomLoad { min-height: 260px; background:#1a2230; border:1px solid #2f3b52; position:relative; overflow:hidden; }
    #StartRoomLoad img, #StartRoomLoad video { max-width:100%; height:auto; display:block; }
    #StartRoomText { margin-top: 12px; min-height: 96px; max-height: 240px; overflow-y:auto; padding:12px; background:#131a27; border:1px solid #2f3b52; }
    .cmd { margin-top:12px; display:flex; gap:8px; }
    #cmdInput { flex:1; padding:10px; background:#0e1420; color:#fff; border:1px solid #334363; }
    button { padding:10px 14px; background:#3578ff; color:#fff; border:0; cursor:pointer; border-radius:4px; }
    .help { font-size: 12px; color:#b7c7ec; margin-top:8px; }

    .room-item-hotspot { width:48px; height:48px; border:2px solid rgba(120,170,255,.9); border-radius:6px; overflow:hidden; background:rgba(20,40,80,.35); }
    .room-item-hotspot.clickable { cursor:pointer; }
    .room-item-hotspot.non-clickable { opacity:.8; border-style:dashed; }
    .room-item-hotspot-image { width:100%; height:100%; object-fit:cover; display:block; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Starter Game Idea: Lighthouse Mystery</h1>
    <div id="StartRoomLoad"></div>
    <div id="StartRoomText"></div>

    <div id="gameNav"></div>
    <div id="gameMap"></div>

    <div class="cmd">
      <input id="cmdInput" type="text" placeholder="Type a command" />
      <button id="runBtn" type="button">Run</button>
      <button id="clearBtn" type="button">Clear</button>
    </div>
    <div class="help">Try: <code>look lantern</code>, <code>take lantern</code>, <code>inventory</code>, <code>north</code>, <code>read journal</code>, <code>sing a song</code>.</div>
  </div>

  <!-- Engine includes -->
  <script src="includes/globals.js"></script>
  <script src="includes/globalmessages.js"></script>
  <script src="includes/functions.js"></script>
  <script src="includes/synonyms.js"></script>
  <script src="includes/parser.js"></script>
  <script src="engine/core.js"></script>
  <script src="engine/usercommands.js"></script>

  <!-- Optional UI modules -->
  <script src="includes/compasstemplate.js"></script>
  <script src="includes/compasscmd.js"></script>
  <script src="includes/maptemplate.js"></script>
  <script src="includes/mapcmd.js"></script>

  <!-- Game data for this standalone idea -->
  <script src="gamedata/idea-game.js"></script>

  <script>
    (function bootUi() {
      const input = document.getElementById('cmdInput');
      const runBtn = document.getElementById('runBtn');
      const clearBtn = document.getElementById('clearBtn');

      function runCommand() {
        const value = input.value.trim();
        if (!value) return;
        iterateCmds(value);
        input.value = '';
        input.focus();
      }

      input.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') runCommand();
      });
      runBtn.addEventListener('click', runCommand);
      clearBtn.addEventListener('click', () => {
        clrScreen();
        input.focus();
      });

      if (typeof initGameCompass === 'function') initGameCompass();
      if (typeof initGameMap === 'function') initGameMap();

      input.focus();
    })();
  </script>
</body>
</html>
