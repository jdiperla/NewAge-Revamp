<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NewAge Revamp - Example Game</title>
  <style>
    body { font-family: Arial, sans-serif; background:#111; color:#eee; margin:0; }
    .wrap { max-width: 900px; margin: 24px auto; padding: 0 16px; }
    #StartRoomLoad { min-height: 240px; background:#222; display:flex; align-items:center; justify-content:center; }
    #StartRoomLoad img, #StartRoomLoad video { max-width:100%; height:auto; display:block; }
    #StartRoomText { margin-top: 12px; min-height: 72px; padding:12px; background:#1b1b1b; border:1px solid #333; }
    .cmd { margin-top:12px; display:flex; gap:8px; }
    input { flex:1; padding:10px; background:#181818; color:#fff; border:1px solid #444; }
    button { padding:10px 14px; background:#2d6cdf; color:#fff; border:0; cursor:pointer; }
    .help { font-size: 12px; color:#bbb; margin-top:8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>NewAge Revamp - Example Game</h1>
    <div id="StartRoomLoad"></div>
    <div id="StartRoomText"></div>

    <div class="cmd">
      <input id="cmdInput" type="text" placeholder="Type a command (e.g. east, west, look lamp)" />
      <button id="runBtn" type="button">Run</button>
    </div>
    <div class="help">Try: <code>east</code>, <code>west</code>, <code>look lamp</code>, <code>look door</code>.</div>
  </div>

  <script>
    function buildCandidateUrls(path) {
      const href = window.location.href;
      const normalizedBase = href.endsWith('/') ? href : `${href}/`;
      return [
        path,
        `./${path}`,
        new URL(path, normalizedBase).toString(),
        new URL(path, window.location.origin + window.location.pathname.replace(/[^/]*$/, '/')).toString(),
        `/${path}`
      ];
    }

    async function loadEngineFile(path) {
      const candidates = buildCandidateUrls(path);
      let lastErr = null;

      for (const url of candidates) {
        try {
          const res = await fetch(url);
          if (!res.ok) {
            lastErr = new Error(`HTTP ${res.status} for ${url}`);
            continue;
          }

          let source = await res.text();
          source = source.replace(/^\s*<script>/i, '').replace(/<\/script>\s*$/i, '');
          (0, eval)(source);
          return;
        } catch (err) {
          lastErr = err;
        }
      }

      throw new Error(`Failed to load ${path}. Last error: ${lastErr ? lastErr.message : 'unknown error'}`);
    }

    async function boot() {
      const files = [
        'includes/globals.js',
        'includes/globalmessages.js',
        'includes/functions.js',
        'includes/synonyms.js',
        'includes/parser.js',
        'engine/core.js',
        'engine/usercommands.js',
        'gamedata/game.js'
      ];

      for (const file of files) {
        await loadEngineFile(file);
      }

      const input = document.getElementById('cmdInput');
      const runBtn = document.getElementById('runBtn');

      function runCommand() {
        const value = input.value.trim();
        if (!value) return;
        iterateCmds(value);
        input.value = '';
        input.focus();
      }

      input.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          runCommand();
        }
      });

      runBtn.addEventListener('click', runCommand);
      input.focus();
    }

    boot().catch((err) => {
      const target = document.getElementById('StartRoomText');
      target.textContent = `Failed to boot game: ${err.message}`;
      console.error(err);
    });
  </script>
</body>
</html>
