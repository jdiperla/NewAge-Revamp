function replaceAll(str, find, replace) {
  return str.split(find).join(replace);
}

function errMsg(errorglobal) {
 //Whenever the player wants to go in a direction that does not exist at the current location, the exit message will throw out a random
 //exit message from the global list.
  var rndMsgLngth = globalmsg[errorglobal].length;
  var rndMsgRst = Math.floor(Math.random() * rndMsgLngth);
  return globalmsg[errorglobal][rndMsgRst];
}

function findBetween(text, firststring, secondstring){
  //Function to text between two strings.
  var regExString = new RegExp('(?:' + firststring + ')((.[\\s\\S]*))(?:' + secondstring + ')', 'ig');
  var strResult = regExString.exec(text);

  return strResult[1];
}

function strDelimiterCnt(text, delimiter){
 //Function to enter a string and divide it using a delimiter and return the count
  var textsep = text.split(delimiter);

  return textsep.length;
}

function strDelimiter(text, delimiter, pos){
 //Function to enter a string and divide it using a delimiter and return the string at the split position
  var textsep = text.split(delimiter);

  return textsep[pos];
}

function rtnStringInstances(string, searchinstance) {
//returns the number of times the search appears in the string.
  var escaped = searchinstance.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  var regex = new RegExp(escaped, 'gi');
  var result;
  var indices = [];

  while ((result = regex.exec(string))) {
    indices.push(result);
  }

  return indices.length;
}

/*This will parse the command line input received by the user/player and will parse the commands, useless words and objects and Eval
the correct function to perform. myActionArray and myStringArray act as a container for the command words. myIgnoredWods and myUselessWords
act as a container for words to ignore such "With, on, for, etc...". consoleString & cmdSTR would be the complete command entered by the user.
textCMD will the command word that was parsed(EG: Look, Talk, etc...). objectTXT grabs the object that we are performing the action on. */

//Example: ParsePlayerInput('the,At,On', 'on,with,and', 'Talk at the Shiny Lamp')
function ParsePlayerInput(myIgnoredWords, delimeterWords, consoleString) {

//create array for delimeterWords and ignored words
var coldelwords = [];
var coligwords = [];

//make all input lowercase so all cases match
var myUselessWords = myIgnoredWords;
myUselessWords = myUselessWords.toLowerCase();
myUselessWords = myUselessWords.split(',');

consoleString = consoleString.toLowerCase();
var phrasedirect = '';
var onewordcmd = consoleString.split(' ').slice(0, 1).join(' ');
var twowordcmd = consoleString.split(' ').slice(0, 2).join(' ');
var threewordcmd = consoleString.split(' ').slice(0, 3).join(' ');

var textcmd = '';
var firstObj = '';

//Find the command
for (let syn in synonyms) {
    if (syn === onewordcmd || syn === twowordcmd || syn === threewordcmd) {
        textcmd = synonyms[syn][0];
        phrasedirect = syn;
        break;
    }
}

if (!textcmd) {
    textcmd = CMDERROR;
}

if (textcmd) {
//this removes the command word "textcmd" from the input string
consoleString = consoleString.replace(phrasedirect, '');

}

//Remove the ignored words now
myIgnoredWords = myIgnoredWords.toLowerCase();
var a = myIgnoredWords.split(','), i;

for (i = 0; i < a.length; i++) {
var replacedWord = ' ' + a[i] + ' ';
coligwords.push(replacedWord.trim());
    consoleString = replaceAll(consoleString, replacedWord, ' ');
}

//This will replace delimeter words such as on/and/with or whatever is described with a comma to make it into an array
delimeterWords = delimeterWords.toLowerCase();
a = delimeterWords.split(',');

for (i = 0; i < a.length; i++) {
var replacedDelWord = ' ' + a[i] + ' ';
    consoleString = replaceAll(consoleString, replacedDelWord, ',');
    coldelwords.push(replacedDelWord.trim());
}

//replace white space commands with an underscore after trimming the whitespaces at either end
consoleString = consoleString.trim();
consoleString = replaceAll(consoleString, ' ', '_');

firstObj = consoleString.split(',', 2);

if (textcmd === CMDERROR) {
    scrnDisplay(errMsg('nocmd')); //if No synonym or command is found in the synonym list, it will throw an error. Otherwise will continue processing
}
else {
    var executeParse = firstObj[0] + '_' + textcmd; //eg: desk_look

    var execFn = window[executeParse] || globalThis[executeParse];
    if (typeof execFn === 'function') {
        //if no command was defined in the code, it will throw an error and run one of the customized error messages
        execFn();
    }
    else {
        scrnDisplay(errMsg('nocmd'));
    }
}
}

// ===== engine/usercommands.js =====
var DIRECTION = '';
var DIRECTIONBLOCK = '';
var DIRECTIONBLOCKDESC = '';

function iterateCmds(command) {
//This command separates commands based on a set of words that can be used as delimiters and then runs each set of commands one after the other.
//EG: Put the water in the pot. Then Put the pot on the stove. Turn the stove on. 
//This still needs work though as some of these delimiter words can be used for other things besides delimiting a sentence.

    command = command.toLowerCase();
    command = replaceAll(command, 'and also', '||');
    command = replaceAll(command, 'and then', '||');
    command = replaceAll(command, 'then also', '||');
    command = replaceAll(command, '. then', '||');
    command = replaceAll(command, 'then', '||');
    command = replaceAll(command, 'also', '||');
    command = replaceAll(command, 'and', '||');
    command = replaceAll(command, '.', '||');

    var cmdsplit = command.split('||');

    for (var i = 0; i < cmdsplit.length; i++) {
        var singleCmd = cmdsplit[i].trim();
        if (singleCmd) {
            processcommand(singleCmd);
        }
    }
}

function processcommand(command) {
    let EAST = GAMEEAST.includes(command);
    let WEST = GAMEWEST.includes(command);
    let SOUTH = GAMESOUTH.includes(command);
    let NORTH = GAMENORTH.includes(command);
    let NORTHEAST = GAMENORTHEAST.includes(command);
    let SOUTHEAST = GAMESOUTHEAST.includes(command);
    let SOUTHWEST = GAMESOUTHWEST.includes(command);
    let NORTHWEST = GAMENORTHWEST.includes(command);
    let UP = GAMEUP.includes(command);
    let DOWN = GAMEDOWN.includes(command);

    if (EAST) {
        DIRECTION = OBJECTGOEAST;
        DIRECTIONBLOCK = OBJECTGOEASTBLOCK;
        DIRECTIONBLOCKDESC = OBJECTGOEASTBLOCKDESC;
        performTravel();
    }
    else if (WEST) {
        DIRECTION = OBJECTGOWEST;
        DIRECTIONBLOCK = OBJECTGOWESTBLOCK;
        DIRECTIONBLOCKDESC = OBJECTGOWESTBLOCKDESC;
        performTravel();
    }
    else if (SOUTH) {
        DIRECTION = OBJECTGOSOUTH;
        DIRECTIONBLOCK = OBJECTGOSOUTHBLOCK;
        DIRECTIONBLOCKDESC = OBJECTGOSOUTHBLOCKDESC;
        performTravel();
    }
    else if (NORTH) {
        DIRECTION = OBJECTGONORTH;
        DIRECTIONBLOCK = OBJECTGONORTHBLOCK;
        DIRECTIONBLOCKDESC = OBJECTGONORTHBLOCKDESC;
        performTravel();
    }
    else if (NORTHEAST) {
        DIRECTION = OBJECTGONORTHEAST;
        DIRECTIONBLOCK = OBJECTGONORTHEASTBLOCK;
        DIRECTIONBLOCKDESC = OBJECTGONORTHEASTBLOCKDESC;
        performTravel();
    }
    else if (SOUTHEAST) {
        DIRECTION = OBJECTGOSOUTHEAST;
        DIRECTIONBLOCK = OBJECTGOSOUTHEASTBLOCK;
        DIRECTIONBLOCKDESC = OBJECTGOSOUTHEASTBLOCKDESC;
        performTravel();
    }
    else if (SOUTHWEST) {
        DIRECTION = OBJECTGOSOUTHWEST;
        DIRECTIONBLOCK = OBJECTGOSOUTHWESTBLOCK;
        DIRECTIONBLOCKDESC = OBJECTGOSOUTHWESTBLOCKDESC;
        performTravel();
    }
    else if (NORTHWEST) {
        DIRECTION = OBJECTGONORTHWEST;
        DIRECTIONBLOCK = OBJECTGONORTHWESTBLOCK;
        DIRECTIONBLOCKDESC = OBJECTGONORTHWESTBLOCKDESC;
        performTravel();
    }
    else if (UP) {
        DIRECTION = OBJECTGOUP;
        DIRECTIONBLOCK = OBJECTGOUPBLOCK;
        DIRECTIONBLOCKDESC = OBJECTGOUPBLOCKDESC;
        performTravel();
    }
    else if (DOWN) {
        DIRECTION = OBJECTGODOWN;
        DIRECTIONBLOCK = OBJECTGODOWNBLOCK;
        DIRECTIONBLOCKDESC = OBJECTGODOWNBLOCKDESC;
        performTravel();
    }
    //The final else. If all else fails, parse the command that was given.
    else {
        ParsePlayerInput(IGNOREWORDS, DELIMETERWORDS, command);
    }
}

function performTravel() {
 //The function first checks if the direction is blocked. If not, it will load the room.
 //If the Direction is blocked or locked, it will then display the lock message on the screen.
 //If the Direction you are heading in does not have an exit, it will run the command for "no exit found".
    var travelData = GameObjectTravel[OBJECTGLOBAL] || [];
    var destination = (travelData[DIRECTION] && travelData[DIRECTION][1]) || '';
    var blockReason = (travelData[DIRECTIONBLOCK] && travelData[DIRECTIONBLOCK][1]) || '';
    var blockDesc = (travelData[DIRECTIONBLOCKDESC] && travelData[DIRECTIONBLOCKDESC][1]) || '';

    if (blockReason !== '' || blockDesc !== '') {
        scrnDisplay(blockDesc || errMsg('noexit'));
        return;
    }

    if (!destination) {
        scrnDisplay(errMsg('noexit'));
        return;
    }

    LoadRoom(destination);
}

  <script>
    (function bootUi() {
      const input = document.getElementById('cmdInput');
      const runBtn = document.getElementById('runBtn');

      function runCommand() {
        const value = input.value.trim();
        if (!value) return;
        iterateCmds(value);
        input.value = '';
        input.focus();
      }

      input.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          runCommand();
        }
      });

      runBtn.addEventListener('click', runCommand);
      input.focus();
    })();
  </script>
